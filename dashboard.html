              <div key={r.report_id || i} style={{ padding: "14px 18px", borderBottom: i < reports.length - 1 ? "1px solid var(--border-soft)" : "0" }}>
                <div className="row between" style={{ marginBottom: 10 }}>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 13.5, marginBottom: 2 }}>
                      Période · {fmtDate(r.periode_debut)} → {fmtDate(r.periode_fin)}
                    </div>
                    <div className="small muted">Généré {relTime(r.created_at)}</div>
                  </div>
                </div>
                <div className="grid" style={{ gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
                  <div style={{ padding: 10, background: "var(--bg-2)", borderRadius: 8 }}>
                    <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>Vues</div>
                    <div className="mono" style={{ fontWeight: 600 }}>{(r.total_vues || 0).toLocaleString("fr-FR")}</div>
                  </div>
                  <div style={{ padding: 10, background: "var(--bg-2)", borderRadius: 8 }}>
                    <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>Appels</div>
                    <div className="mono" style={{ fontWeight: 600 }}>{(r.total_appels || 0).toLocaleString("fr-FR")}</div>
                  </div>
                  <div style={{ padding: 10, background: "var(--bg-2)", borderRadius: 8 }}>
                    <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>Clics site</div>
                    <div className="mono" style={{ fontWeight: 600 }}>{(r.total_clics || 0).toLocaleString("fr-FR")}</div>
                  </div>
                  <div style={{ padding: 10, background: "var(--bg-2)", borderRadius: 8 }}>
                    <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>Itinéraires</div>
                    <div className="mono" style={{ fontWeight: 600 }}>{(r.total_itineraires || 0).toLocaleString("fr-FR")}</div>
                  </div>
                  <div style={{ padding: 10, background: "var(--bg-2)", borderRadius: 8 }}>
                    <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>Nouveaux avis</div>
                    <div className="mono" style={{ fontWeight: 600 }}>{(r.nouveaux_avis || 0).toLocaleString("fr-FR")}</div>
                  </div>
                  <div style={{ padding: 10, background: "var(--bg-2)", borderRadius: 8 }}>
                    <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>Réponses avis</div>
                    <div className="mono" style={{ fontWeight: 600 }}>{(r.avis_replies || 0).toLocaleString("fr-FR")}</div>
                  </div>
                  <div style={{ padding: 10, background: "var(--bg-2)", borderRadius: 8 }}>
                    <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>Posts publiés</div>
                    <div className="mono" style={{ fontWeight: 600 }}>{(r.posts_total || 0).toLocaleString("fr-FR")}</div>
                  </div>
                  <div style={{ padding: 10, background: "var(--bg-2)", borderRadius: 8 }}>
                    <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>ID rapport</div>
                    <div className="mono small muted" style={{ fontSize: 10.5 }}>{r.report_id || "—"}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

                          value={v == null ? "" : v} onChange={e => set(e.target.value)}/>
              </_AdminField>
            );
          }
          const inputType = f.type === "date" ? "date"
                          : f.type === "email" ? "email"
                          : f.type === "tel" ? "tel"
                          : f.type === "url" ? "url"
                          : (f.type === "int" || f.type === "num") ? "number"
                          : "text";
          const stepAttr = f.type === "num" ? "any" : (f.type === "int" ? "1" : undefined);
          const inputVal = f.type === "date" ? dateValue(v) : (v == null ? "" : String(v));
          return (
            <_AdminField key={f.key} label={f.label} hint={f.hint}>
              <input className="search" type={inputType} step={stepAttr}
                     style={{ width: "100%", minWidth: 0, cursor: "text", color: "var(--text-1)" }}
                     value={inputVal} onChange={e => set(e.target.value)}/>
            </_AdminField>
          );
        })}

        <button className="btn primary" onClick={onSave} disabled={busy}>{busy ? "Enregistrement…" : "Enregistrer"}</button>
      </div>
    </div>
  );
}

function _TableEditor({ table, clientId, onChanged }) {
  const schema = TABLE_SCHEMAS[table];
  const [rows, setRows] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [editingId, setEditingId] = React.useState(null);
  const [adding, setAdding] = React.useState(false);
  const [draft, setDraft] = React.useState({});
  const [error, setError] = React.useState(null);
  const [busy, setBusy] = React.useState(false);

  async function load() {
    if (!clientId) { setRows([]); return; }
    setLoading(true);
    let q = sb.from(table).select("*").eq("client_id", clientId);
    if (schema.orderBy) q = q.order(schema.orderBy, { ascending: !schema.orderDesc });
    const { data, error: err } = await q;
    setLoading(false);
    if (err) { setError(err.message); setRows([]); return; }
    setRows(data || []);
  }

  React.useEffect(() => { load(); }, [table, clientId]);

  function startEdit(r) {
    setEditingId(r.id); setAdding(false);
    setDraft({ ...r });
    setError(null);
  }
  function startAdd() {
    setAdding(true); setEditingId(null);
    const empty = {};
    schema.fields.forEach(f => { empty[f.key] = f.type === "bool" ? false : ""; });
    setDraft(empty);
    setError(null);
  }
  function cancel() {
    setEditingId(null); setAdding(false); setDraft({}); setError(null);
  }

  function buildPayload() {
    const p = {};
    schema.fields.forEach(f => {
      let v = draft[f.key];
      if (v === "" || v === undefined) v = null;
      else if (f.type === "int") { v = parseInt(v, 10); if (Number.isNaN(v)) v = null; }
      else if (f.type === "num") { v = parseFloat(v); if (Number.isNaN(v)) v = null; }
      else if (f.type === "bool") v = !!v;
      else if (typeof v === "string") v = v.trim() || null;
      p[f.key] = v;
    });
    return p;
  }

  async function save() {
    setError(null);
    for (const f of schema.fields) {
      if (f.required) {
        const v = draft[f.key];
        if (v === undefined || v === null || (typeof v === "string" && !v.trim())) {
          setError("Champ requis manquant : " + f.label.replace(" *", ""));
          return;
        }
      }
    }
    setBusy(true);
    const payload = buildPayload();
    let res;
    if (adding) {
      payload.client_id = clientId;
      res = await sb.from(table).insert(payload).select().single();
    } else {
      res = await sb.from(table).update(payload).eq("id", editingId).select().single();
    }
    setBusy(false);
    if (res.error) { setError(res.error.message); return; }
    cancel();
    await load();
    if (onChanged) onChanged();
  }

  async function del(id) {
    if (!window.confirm("Supprimer cette ligne définitivement ?")) return;
    setError(null);
    const { error: err } = await sb.from(table).delete().eq("id", id);
    if (err) { setError(err.message); return; }
    await load();
    if (onChanged) onChanged();
  }

  return (
    <div className="stack-md">
      <div className="row between">
        <div className="muted small">{loading ? "Chargement…" : (rows.length + " ligne" + (rows.length > 1 ? "s" : ""))}</div>
        {!editingId && !adding && (
          <button className="btn primary small" onClick={startAdd} disabled={!clientId}>
            <Icon name="plus" size={12}/> Ajouter
          </button>
        )}
      </div>

      {error && <div className="small" style={{ color: "var(--danger)" }}>{error}</div>}

      {adding && (
        <_RowForm schema={schema} draft={draft} setDraft={setDraft}
                  onSave={save} onCancel={cancel} busy={busy}
                  title={"Nouvelle ligne · " + schema.label}/>
      )}

      {rows.map(r => editingId === r.id ? (
        <_RowForm key={r.id} schema={schema} draft={draft} setDraft={setDraft}
                  onSave={save} onCancel={cancel} busy={busy}
                  title={"Édition · " + schema.summary(r)}/>
      ) : (
        <div key={r.id} className="row between" style={{ padding: 12, border: "1px solid var(--border-soft)", borderRadius: 10, gap: 8 }}>
          <div style={{ minWidth: 0, flex: 1 }}>
            <div style={{ fontWeight: 600, fontSize: 13 }}>{schema.summary(r)}</div>
            <div className="small muted mono" style={{ fontSize: 10.5 }}>{r.id}</div>
          </div>
          <div className="row" style={{ gap: 6, flexShrink: 0 }}>
            <button className="btn small" onClick={() => startEdit(r)} title="Éditer"><Icon name="edit" size={12}/></button>
            <button className="btn small" onClick={() => del(r.id)} title="Supprimer" style={{ color: "var(--danger)" }}>×</button>
          </div>
        </div>
      ))}

      {!loading && rows.length === 0 && !adding && (
        <div className="muted small" style={{ padding: 24, textAlign: "center", border: "1px dashed var(--border-soft)", borderRadius: 10 }}>
          {clientId ? "Aucune ligne pour ce client. Cliquez Ajouter pour en créer une." : "Sélectionne un client en haut du panneau."}
        </div>
      )}
    </div>
  );
}

  const reviewsRepliedThisMonth = reviews.filter(r => r.replied_at && new Date(r.replied_at) >= monthStart);
  const reportsThisMonth = reports.filter(r => r.created_at && new Date(r.created_at) >= monthStart);

  const totalActions = postsPublished.length + reviews.filter(r => r.reply_text).length + reports.length;
  const actionsThisMonth = postsThisMonth.length + reviewsRepliedThisMonth.length + reportsThisMonth.length;

  const minutesSaved = postsPublished.length * 5 + reviews.filter(r => r.reply_text).length * 3 + reports.length * 30;
  const daysSaved = (minutesSaved / 60 / 8).toFixed(1);
  const minutesSavedMonth = postsThisMonth.length * 5 + reviewsRepliedThisMonth.length * 3 + reportsThisMonth.length * 30;
  const daysSavedMonth = (minutesSavedMonth / 60 / 8).toFixed(1);

  const leadsToFollowUp = leads.filter(l => {
    const s = (l.statut || "").toLowerCase();
    if (s === "gagné" || s === "gagne" || s === "perdu") return false;
    if (!l.created_at) return false;
    const ageDays = (now - new Date(l.created_at).getTime()) / 86400000;
    return ageDays >= 3;
  });

  const curMonth = new Date().toISOString().slice(0,7);
  const adsKpisCur = kpisRows.filter(k => (k.periode || "").slice(0,7) === curMonth && (k.source === "google_ads" || k.source === "meta"));
  const sumK = (rows, src, k) => rows.filter(r => r.source === src).reduce((s, r) => s + Number(r[k] || 0), 0);
  const adsBySource = ["google_ads", "meta"].map(src => ({
    src,
    label: src === "google_ads" ? "Google Ads" : "Meta Ads",
    color: src === "google_ads" ? "oklch(0.80 0.120 60)" : "oklch(0.74 0.155 55)",
    leads: sumK(adsKpisCur, src, "nb_leads"),
    depense: sumK(adsKpisCur, src, "depense"),
    ca: sumK(adsKpisCur, src, "ca_genere"),
    deals: sumK(adsKpisCur, src, "deals"),
    cpl: sumK(adsKpisCur, src, "cout_par_lead"),
    roas: kpisRows.filter(k => (k.periode || "").slice(0,7) === curMonth && k.source === src).reduce((m, k) => Math.max(m, Number(k.roas) || 0), 0),
  }));

  function relTime(iso) {
    if (!iso) return "—";
    const delta = Math.floor((now - new Date(iso).getTime()) / 1000);
    if (delta < 0) {
      const future = -delta;
      if (future < 3600) return "dans " + Math.floor(future / 60) + " min";
      if (future < 86400) return "dans " + Math.floor(future / 3600) + "h";
      return "dans " + Math.floor(future / 86400) + "j";
    }
    if (delta < 60) return "il y a " + delta + "s";
    if (delta < 3600) return "il y a " + Math.floor(delta / 60) + " min";
    if (delta < 86400) return "il y a " + Math.floor(delta / 3600) + "h";
    return "il y a " + Math.floor(delta / 86400) + "j";
  }
  function postStatusTag(s) {
    const k = (s || "").toLowerCase();
    if (k === "published") return "success";
    if (k === "scheduled" || k === "pending") return "accent";
    if (k === "failed" || k === "error") return "danger";
    return "";
  }
  function clientNameByGmbId(gmbId) {
    const c = clients.find(x => x.gmb_client_id === gmbId);
    return c ? c.nom : (gmbId || "—");
  }
  function clientNameById(id) {
    const c = clients.find(x => x.id === id);
    return c ? c.nom : "—";
  }

  const feed = [];
  postsPublished.slice(0, 30).forEach(p => {
    feed.push({
      type: "post",
      label: "Post publié sur GMB",
      who: clientNameByGmbId(p.client_id),
      detail: (p.post_text || "").slice(0, 140) + ((p.post_text || "").length > 140 ? "…" : ""),
      time: p.published_at || p.created_at,
      icon: "globe",
      tone: "var(--success)",
    });
  });
  reviews.filter(r => r.reply_text).slice(0, 30).forEach(r => {
    feed.push({
      type: "reply",
      label: "Réponse à un avis (note " + (r.rating || "?") + "/5)",
      who: clientNameById(r.agency_client_id),
      detail: (r.reply_text || "").slice(0, 140),
      time: r.replied_at || r.created_at,
      icon: "sparkles",
      tone: "var(--accent)",
    });
  });
  reports.slice(0, 30).forEach(r => {
    feed.push({
      type: "report",
      label: "Rapport de performance généré",
      who: clientNameById(r.agency_client_id),
      detail: "Période " + (r.periode_debut || "?") + " → " + (r.periode_fin || "?") + " · " + (r.total_vues || 0) + " vues",
      time: r.created_at,
      icon: "save",
      tone: "var(--info)",
    });
  });
  feed.sort((a, b) => new Date(b.time || 0) - new Date(a.time || 0));
  const feedTop = feed.slice(0, 12);

  return (
    <div className="stack-lg fade-up">
      <div className="hero-panel">
        <div>
          <div className="row" style={{ gap: 8, marginBottom: 6 }}>
            <span className="tag accent"><Icon name="sparkles" size={10}/> <EditableText value="Agent HelpAi" tag="span"/></span>
            <span className="pill live"><span className="dot"/> <EditableText value="Actif 24/7 · données live" tag="span"/></span>
          </div>
          <EditableText value={"L'IA a réalisé " + totalActions + " action" + (totalActions > 1 ? "s" : "") + " — " + daysSaved + " jour" + (Number(daysSaved) > 1 ? "s" : "") + " de travail économisé."} tag="div" className="hp-title" multiline/>
          <EditableText value="Posts GMB, réponses aux avis, rapports de performance, gestion des relances — tout est synchronisé en temps réel avec le bot Telegram." tag="div" className="hp-sub" multiline/>
        </div>
      </div>

      <div className="kpi-grid" style={{ gridTemplateColumns: "repeat(4, 1fr)" }}>
        <div className="kpi">
          <div className="kpi-label"><EditableText value="Actions IA (total)" tag="span"/><span className="trend up">+{actionsThisMonth} ce mois</span></div>
          <div className="kpi-value"><span className="mono">{totalActions.toLocaleString("fr-FR")}</span></div>
        </div>
        <div className="kpi">
          <div className="kpi-label"><EditableText value="Temps économisé" tag="span"/><span className="trend up">+{daysSavedMonth}j ce mois</span></div>
          <div className="kpi-value"><span className="mono">{daysSaved}</span><span className="unit">jours</span></div>
        </div>
        <div className="kpi">
          <div className="kpi-label"><EditableText value="Posts planifiés" tag="span"/></div>
          <div className="kpi-value"><span className="mono">{postsScheduled.length}</span></div>
        </div>
        <div className="kpi">
          <div className="kpi-label"><EditableText value="Leads à relancer" tag="span"/></div>
          <div className="kpi-value"><span className="mono">{leadsToFollowUp.length}</span></div>
        </div>
      </div>

      <div className="grid g-2">
        <div className="card">
          <div className="card-head">
            <div>
              <EditableText value="Activité GMB récente" tag="div" className="card-title"/>
              <EditableText value="Posts publiés, réponses aux avis, rapports générés" tag="div" className="card-sub"/>
            </div>
            <span className="pill live"><span className="dot"/> Temps réel</span>
          </div>
          <div className="card-body" style={{ padding: 0, maxHeight: 520, overflow: "auto" }}>
            {feedTop.length === 0 && <div className="muted small" style={{ padding: 20, textAlign: "center" }}>Aucune activité IA pour l'instant.</div>}
            {feedTop.map((f, i) => (
              <div key={i} style={{ padding: "12px 18px", borderBottom: i < feedTop.length - 1 ? "1px solid var(--border-soft)" : "0" }}>
                <div className="row" style={{ gap: 10, alignItems: "flex-start" }}>
                  <div style={{ width: 28, height: 28, borderRadius: 8, background: "var(--surface-2)", color: f.tone, display: "grid", placeItems: "center", flexShrink: 0 }}>
                    <Icon name={f.icon} size={14}/>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div className="row between" style={{ marginBottom: 2 }}>
                      <span style={{ fontSize: 12.5, fontWeight: 600 }}>{f.label}</span>
                      <span className="mono small muted">{relTime(f.time)}</span>
                    </div>
                    <div className="small" style={{ color: "var(--text-3)", marginBottom: 4 }}>Client : <strong style={{ color: "var(--text-2)" }}>{f.who}</strong></div>
                    <div className="small" style={{ color: "var(--text-2)", lineHeight: 1.5 }}>{f.detail}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="card">
          <div className="card-head">
            <div>
              <EditableText value="Activité à venir" tag="div" className="card-title"/>
              <EditableText value="Posts planifiés et leads à relancer" tag="div" className="card-sub"/>
            </div>
          </div>
          <div className="card-body" style={{ padding: 0, maxHeight: 520, overflow: "auto" }}>
            {postsScheduled.length === 0 && leadsToFollowUp.length === 0 && (
              <div className="muted small" style={{ padding: 20, textAlign: "center" }}>Rien de planifié pour l'instant.</div>
            )}
            {postsScheduled.slice(0, 8).map((p) => (
              <div key={"sp-" + p.id} style={{ padding: "12px 18px", borderBottom: "1px solid var(--border-soft)" }}>
                <div className="row between" style={{ marginBottom: 4 }}>
                  <div className="row" style={{ gap: 8 }}>
                    <Icon name="calendar" size={13} style={{ color: "var(--accent)" }}/>
                    <span style={{ fontSize: 12.5, fontWeight: 600 }}>Post GMB planifié</span>
                    <span className={"tag " + postStatusTag(p.status)}>{p.status}</span>
                  </div>
                  <span className="mono small" style={{ color: "var(--accent)" }}>{relTime(p.scheduled_at)}</span>
                </div>
                <div className="small" style={{ color: "var(--text-3)", marginBottom: 4 }}>Client : <strong style={{ color: "var(--text-2)" }}>{clientNameByGmbId(p.client_id)}</strong></div>
                <div className="small" style={{ color: "var(--text-2)", lineHeight: 1.5 }}>{(p.post_text || "").slice(0, 120)}…</div>
              </div>
            ))}
            {leadsToFollowUp.slice(0, 8).map((l) => {
              const ageDays = Math.floor((now - new Date(l.created_at).getTime()) / 86400000);
              return (
                <div key={"l-" + l.id} style={{ padding: "12px 18px", borderBottom: "1px solid var(--border-soft)" }}>
                  <div className="row between" style={{ marginBottom: 4 }}>
                    <div className="row" style={{ gap: 8 }}>
                      <Icon name="zap" size={13} style={{ color: "var(--accent-2)" }}/>
                      <span style={{ fontSize: 12.5, fontWeight: 600 }}>Lead à relancer</span>
                      <span className="tag">{l.statut || "nouveau"}</span>
                    </div>
                    <span className="mono small muted">J+{ageDays}</span>
                  </div>
                  <div className="small" style={{ color: "var(--text-3)", marginBottom: 4 }}>Client : <strong style={{ color: "var(--text-2)" }}>{clientNameById(l.client_id)}</strong></div>
                  <div className="small" style={{ color: "var(--text-2)" }}>{l.nom || "Anonyme"} · {l.source || "—"} · {l.email || l.telephone || "—"}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <div>
            <EditableText value="Performance Ads — mois courant" tag="div" className="card-title"/>
            <EditableText value="Google Ads & Meta Ads · alimenté par les KPIs synchronisés" tag="div" className="card-sub"/>
          </div>
          {lsaLeads.length > 0 && <span className="tag accent">{lsaLeads.length} leads LSA</span>}
        </div>
        <div className="card-body grid g-2">
          {adsBySource.map(a => (
            <div key={a.src} style={{ padding: 16, border: "1px solid var(--border-soft)", borderRadius: 12, background: "var(--bg-2)" }}>
              <div className="row between" style={{ marginBottom: 12 }}>
                <div className="row" style={{ gap: 8 }}>
                  <span style={{ width: 10, height: 10, borderRadius: 3, background: a.color, display: "inline-block" }}/>
                  <strong style={{ fontSize: 13 }}>{a.label}</strong>
                </div>
                <span className="tag">{curMonth}</span>
              </div>
              <div className="grid g-2" style={{ gap: 10 }}>
                <div>
                  <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>Leads</div>
                  <div className="mono" style={{ fontWeight: 700, fontSize: 18 }}>{a.leads.toLocaleString("fr-FR")}</div>
                </div>
                <div>
                  <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>Dépense</div>
                  <div className="mono" style={{ fontWeight: 700, fontSize: 18 }}>{Math.round(a.depense / 100).toLocaleString("fr-FR")} €</div>
                </div>
                <div>
                  <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>CPL moyen</div>
                  <div className="mono" style={{ fontWeight: 700, fontSize: 18 }}>{Math.round(a.cpl / 100)} €</div>
                </div>
                <div>
                  <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>ROAS</div>
                  <div className="mono" style={{ fontWeight: 700, fontSize: 18 }}>{a.roas.toFixed(2)}x</div>
                </div>
                <div>
                  <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>Deals</div>
                  <div className="mono" style={{ fontWeight: 700, fontSize: 18 }}>{a.deals}</div>

                <div>
                  <div className="small muted" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>CA généré</div>
                  <div className="mono" style={{ fontWeight: 700, fontSize: 18 }}>{Math.round(a.ca / 100).toLocaleString("fr-FR")} €</div>
                </div>
              </div>
            </div>
          ))}
        </div>
        {lsaLeads.length > 0 && (
          <div style={{ borderTop: "1px solid var(--border-soft)", padding: "14px 18px" }}>
            <div className="row between" style={{ marginBottom: 10 }}>
              <strong style={{ fontSize: 12.5 }}>Leads Google Local Services Ads (récents)</strong>
              <span className="small muted">{lsaLeads.length} au total</span>
            </div>
            <div className="stack-sm">
              {lsaLeads.slice(0, 5).map(l => (
                <div key={l.id} className="row between" style={{ padding: 8, background: "var(--bg-2)", borderRadius: 8 }}>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 12.5 }}>{l.customer_name || "Anonyme"}</div>
                    <div className="small muted">{l.service_type || "—"} · {l.location || "—"} · {l.lead_type || "—"}</div>
                  </div>
                  <div className="row" style={{ gap: 8 }}>
                    <span className="tag">{l.status || "—"}</span>
                    <span className="mono small muted">{relTime(l.lead_created_at)}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 600, fontSize: 12.5, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>Mon compte</div>
              <div className="small muted" style={{ fontSize: 10.5 }}>Profil & documents</div>
            </div>
            <Icon name="chev" size={12} className="workspace-chev"/>
          </button>
          <button className="btn ghost small" style={{ width:'100%', justifyContent:'center', marginTop: 8, height: 28 }} onClick={onLogout}>
            Déconnexion
          </button>
        </div>
      </aside>

      {/* ============ MAIN ============ */}
      <div className="main" style={{ paddingRight: editorOpen ? 760 : 0, transition: "padding-right 0.25s ease" }}>
        <div className="topbar">
          <div className="crumbs">
            <span>{meta.breadcrumb}</span>
            <span className="crumb-sep">/</span>
            <strong>{meta.title}</strong>
          </div>
          <div className="spacer"/>
          <div className="search" onClick={() => {}}>
            <Icon name="search" size={14}/>
            <span>Chercher un lead, un client…</span>
            <kbd>⌘K</kbd>
          </div>
          {isAdmin && (
            <button
              className={"btn " + (editorOpen ? "primary" : "")}
              onClick={() => setEditorOpen(o => !o)}
              title="Édition manuelle des données"
            >
              <Icon name="edit" size={13}/>
              Modifier
            </button>
          )}
          <button className="btn icon ghost" onClick={() => setTheme(theme === "dark" ? "light" : "dark")} title="Thème">
            <Icon name={theme === "dark" ? "sun" : "moon"} size={14}/>
          </button>
          <button className="btn icon ghost" title="Notifications"><Icon name="bell" size={14}/></button>
          <span className={"av md av-colors-3"}>{(displayName || "??").slice(0,2).toUpperCase()}</span>
        </div>

        {editing && (
          <div className="edit-banner">
            <Icon name="edit" size={13}/>
            <span>
              <strong>Mode édition activé.</strong>{" "}
              Clique directement sur les valeurs ou libellés (ex. CA total, Leads total) pour les modifier visuellement.
              Pour une modification persistante en BDD, utilise le panneau latéral (KPIs, Leads, Factures, Documents).
            </span>
            <button className="btn small ghost" onClick={() => setEditorOpen(false)}>Fermer</button>
          </div>
        )}
        {viewingClientId && viewedClient && (
          <div className="edit-banner" style={{ background: "var(--accent-soft)", borderColor: "var(--accent-border)" }}>
            <Icon name="eye" size={13}/>
            <span><strong>Vue du dashboard de {viewedClient.nom || "—"}.</strong> Toutes les données sont filtrées sur ce client.</span>
            <button className="btn small ghost" onClick={exitClientView}>Quitter la vue</button>
          </div>
        )}
        <div className="page">
          <div className="page-header">
            <div>
              <h1 className="page-title">{meta.title}</h1>
              <div className="page-sub">{meta.sub}</div>
            </div>
            <div className="page-actions">
              <button className="btn" onClick={refresh}>
                <Icon name="refresh" size={13}/> Actualiser
              </button>
              <button className="btn"><Icon name="download" size={13}/> Exporter</button>
            </div>
          </div>
          <EditContext.Provider value={{ editing }}>
            {renderScreen()}
          </EditContext.Provider>
        </div>
      </div>
      {isAdmin && (
        <DataEditDrawer
          open={editorOpen}
          onClose={() => setEditorOpen(false)}
          isAdmin={isAdmin}
          viewingClientId={viewingClientId}
          onChanged={refresh}
        />
      )}
    </div>
  );
}

window.App = App;

/* Mount */
ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate/>);

  </script>
</body>
</html>
